  },
};

// ===================== STORE CONTEXT =====================
const STORAGE_KEY = "amin_repair_store_v1";
const AUTH_KEY = "amin_repair_admin_session_v1";
const ADMIN_PASSWORD = "AMINm2468";
const StoreContext = createContext(null);

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(initialData));
    const parsed = JSON.parse(raw);
    return { ...JSON.parse(JSON.stringify(initialData)), ...parsed };
  } catch {
    return JSON.parse(JSON.stringify(initialData));
  }
}

function StoreProvider({ children }) {
  const [data, setData] = useState(loadStore);
  const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem(AUTH_KEY) === "true");

  useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }, [data]);

  const update = useCallback((updater) => {
    setData((prev) => {
      const clone = JSON.parse(JSON.stringify(prev));
      const next = typeof updater === "function" ? updater(clone) : updater;
      return next;
    });
  }, []);

  const login = (password) => {
    if (password === ADMIN_PASSWORD) {
      localStorage.setItem(AUTH_KEY, "true");
      setIsAdmin(true);
      return true;
    }
    return false;
  };
  const logout = () => { localStorage.removeItem(AUTH_KEY); setIsAdmin(false); };

  const addBrand = (brand) => update((d) => { d.brands.push({ id:`b-${Date.now()}`, models:[], active:true, logo:"📱", ...brand }); return d; });
  const updateBrand = (id, patch) => update((d) => { d.brands = d.brands.map(b => b.id===id ? {...b,...patch} : b); return d; });
  const deleteBrand = (id) => update((d) => { d.brands = d.brands.filter(b => b.id!==id); return d; });
  const addModel = (brandId, modelName) => update((d) => { d.brands = d.brands.map(b => b.id===brandId ? {...b, models:[...b.models,{id:`m-${Date.now()}`,name:modelName}]} : b); return d; });
  const deleteModel = (brandId, modelId) => update((d) => { d.brands = d.brands.map(b => b.id===brandId ? {...b, models:b.models.filter(m=>m.id!==modelId)} : b); return d; });

  const updateService = (id, patch) => update((d) => { d.services = d.services.map(s => s.id===id ? {...s,...patch} : s); return d; });
  const addService = (service) => update((d) => { d.services.push({ id:`s-${Date.now()}`, enabled:true, icon:"🔧", price:"", ...service }); return d; });
  const deleteService = (id) => update((d) => { d.services = d.services.filter(s => s.id!==id); return d; });

  const setTicker = (items) => update((d) => { d.newsTicker = items; return d; });
  const setWhatsappTemplate = (tpl) => update((d) => { d.whatsappTemplate = tpl; return d; });
  const updateSettings = (patch) => update((d) => { d.settings = {...d.settings, ...patch}; return d; });
  const resetToDefaults = () => update(() => JSON.parse(JSON.stringify(initialData)));

  const trackEvent = (type, payload = {}) => update((d) => {
    if (!d.analytics) d.analytics = { whatsappClicks:0, callClicks:0, events:[] };
    if (type==="whatsapp") d.analytics.whatsappClicks = (d.analytics.whatsappClicks||0)+1;
    if (type==="call") d.analytics.callClicks = (d.analytics.callClicks||0)+1;
    d.analytics.events = [{type, ...payload, ts:Date.now()}, ...(d.analytics.events||[])].slice(0,500);
    return d;
  });

  const value = { data, isAdmin, login, logout, addBrand, updateBrand, deleteBrand, addModel, deleteModel,
    updateService, addService, deleteService, setTicker, setWhatsappTemplate, updateSettings, resetToDefaults, trackEvent };

  return <StoreContext.Provider value={value}>{children}</StoreContext.Provider>;
}

function useStore() {
  const ctx = useContext(StoreContext);
  if (!ctx) throw new Error("useStore must be used inside StoreProvider");
  return ctx;
}

// ===================== SHARED COMPONENTS =====================
function NewsTicker() {
  const { data } = useStore();
  const items = data.newsTicker?.length ? data.newsTicker : ["—"];
  const loop = [...items, ...items];
  return (

      <div className="absolute inset-0 bg-scan-line bg-[length:50%_100%] animate-scan opacity-30 pointer-events-none" />
      <div className="flex whitespace-nowrap py-2.5 animate-ticker">
        {loop.map((item, i) => (
          <span key={i} className="mx-8 text-sm text-brass-300/90 font-medium flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-brass-500 inline-block" />{item}
          </span>
        ))}
      </div>

  );
}

          className="flex-1 flex items-center justify-center gap-2 py-3.5 text-brass-400 font-semibold border-l border-ink-700">📞 اتصل الآن</a>
        <a href={waLink} target="_blank" rel="noreferrer" onClick={() => trackEvent("whatsapp",{source:"bottom-bar"})}

function ProtectedRoute({ children }) {

  if (!isAdmin) return <Navigate to="/admin/login" replace />;

// ===================== SMART REPAIR FLOW =====================
function RepairFlow() {
  const { data, trackEvent } = useStore();
  const steps = ["brand","model","issue","action"];
  const stepLabels = { brand:"اختر الماركة", model:"اختر الموديل", issue:"اختر العطل", action:"تواصل الآن" };
  const [stepIndex, setStepIndex] = useState(0);
  const [brand, setBrand] = useState(null);
  const [model, setModel] = useState(null);
  const [issue, setIssue] = useState(null);

  const activeBrands = data.brands.filter(b => b.active);
  const enabledServices = data.services.filter(s => s.enabled);
  const suggestion = issue ? data.suggestions?.[issue.id] : null;

  const message = useMemo(() => {
    if (!brand || !model || !issue) return "";
    return data.whatsappTemplate.replace("{brand}",brand.name).replace("{model}",model.name).replace("{issue}",issue.name);
  }, [brand, model, issue, data.whatsappTemplate]);

  const waLink = `https://wa.me/${data.settings.whatsappNumber}?text=${encodeURIComponent(message)}`;
  const goTo = (i) => setStepIndex(Math.max(0, Math.min(steps.length-1, i)));
  const reset = () => { setBrand(null); setModel(null); setIssue(null); setStepIndex(0); };

  return (
    <section id="repair-flow" className="relative z-10 max-w-3xl mx-auto px-4 py-10">
      <div className="flex items-center justify-between mb-8" dir="rtl">
        {steps.map((s,i) => (
          <div key={s} className="flex-1 flex items-center">
            <div className="flex flex-col items-center gap-1.5 flex-1">
              <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold font-mono transition-colors ${i<=stepIndex ? "bg-brass-500 text-ink-950" : "bg-ink-800 text-white/40 border border-ink-600"}`}>{i+1}</div>
              <span className={`text-[11px] ${i<=stepIndex ? "text-brass-300" : "text-white/30"}`}>{stepLabels[s]}</span>
            </div>
            {i < steps.length-1 && <div className={`h-px flex-1 -mt-5 ${i<stepIndex ? "bg-brass-500" : "bg-ink-700"}`} />}
          </div>
        ))}
      </div>

      <div className="panel p-6 min-h-[280px]" dir="rtl">
        {stepIndex===0 && (
          <div className="animate-fade-up">
            <h3 className="label-eyebrow mb-4">الخطوة الأولى</h3>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              {activeBrands.map((b) => (
                <button key={b.id} onClick={() => { setBrand(b); setModel(null); goTo(1); }}
                  className="panel hover:border-brass-500/60 hover:bg-white/5 transition-all p-4 flex flex-col items-center gap-2 text-center">
                  <span className="text-3xl">{b.logo}</span><span className="font-semibold text-sm">{b.name}</span>
                </button>
              ))}
              {activeBrands.length===0 && <p className="col-span-full text-white/50 text-sm">لا توجد ماركات متاحة حالياً.</p>}
            </div>
          </div>
        )}

        {stepIndex===1 && brand && (
          <div className="animate-fade-up">
            <div className="flex items-center justify-between mb-4">
              <h3 className="label-eyebrow">موديلات {brand.name}</h3>
              <button onClick={() => goTo(0)} className="text-xs text-white/50 hover:text-brass-400">← رجوع</button>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              {brand.models.map((m) => (
                <button key={m.id} onClick={() => { setModel(m); goTo(2); }}
                  className="panel hover:border-brass-500/60 hover:bg-white/5 transition-all p-4 text-sm font-semibold text-center">{m.name}</button>
              ))}
              {brand.models.length===0 && <p className="col-span-full text-white/50 text-sm">لا توجد موديلات مضافة لهذه الماركة.</p>}
            </div>
          </div>
        )}

        {stepIndex===2 && (
          <div className="animate-fade-up">
            <div className="flex items-center justify-between mb-4">
              <h3 className="label-eyebrow">نوع العطل</h3>
              <button onClick={() => goTo(1)} className="text-xs text-white/50 hover:text-brass-400">← رجوع</button>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              {enabledServices.map((s) => (
                <button key={s.id} onClick={() => { setIssue(s); goTo(3); }}
                  className="panel hover:border-brass-500/60 hover:bg-white/5 transition-all p-4 flex flex-col items-center gap-2 text-center">
                  <span className="text-2xl">{s.icon}</span><span className="font-semibold text-xs">{s.name}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {stepIndex===3 && brand && model && issue && (
          <div className="animate-fade-up" dir="rtl">
            <div className="flex items-center justify-between mb-4">
              <h3 className="label-eyebrow">جاهز للتواصل</h3>
              <button onClick={() => goTo(2)} className="text-xs text-white/50 hover:text-brass-400">← رجوع</button>
            </div>
            <div className="bg-ink-900 border border-ink-600 rounded-xl p-4 mb-4 font-mono text-sm text-white/80 leading-relaxed">{message}</div>
            {suggestion && (
              <div className="border border-brass-500/30 bg-brass-500/5 rounded-xl p-3.5 mb-5 text-sm text-brass-200 flex gap-2">
                <span>💡</span><span>{suggestion}</span>
              </div>
            )}
            <div className="flex flex-col sm:flex-row gap-3">
              <a href={waLink} target="_blank" rel="noreferrer"
                onClick={() => trackEvent("whatsapp",{brand:brand.name,model:model.name,issue:issue.name})}

// ===================== ADMIN LOGIN =====================
function AdminLogin() {
  const { login, isAdmin } = useStore();
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const navigate = useNavigate();
  if (isAdmin) navigate("/admin", { replace:true });

  const handleSubmit = (e) => {
    e.preventDefault();
    if (login(password)) navigate("/admin", { replace:true });
    else setError("كلمة المرور غير صحيحة");
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4 bg-hairline-grid bg-[length:36px_36px]">
      <form onSubmit={handleSubmit} className="panel p-8 w-full max-w-sm" dir="rtl">
        <div className="text-center mb-6">
          <div className="w-12 h-12 rounded-xl bg-brass-500 text-ink-950 font-display font-extrabold flex items-center justify-center mx-auto mb-3">أم</div>
          <h1 className="font-display font-bold text-lg">دخول لوحة التحكم</h1>
          <p className="text-white/40 text-xs mt-1">Amin Mahmoud Admin</p>
        </div>
        <label className="label-eyebrow block mb-2">كلمة المرور</label>
        <input type="password" autoFocus value={password}
          onChange={(e) => { setPassword(e.target.value); setError(""); }}
          className="input-field mb-2" placeholder="••••••••" />
        {error && <p className="text-red-400 text-xs mb-3">{error}</p>}
        <button type="submit" className="btn-primary w-full mt-4">دخول</button>
      </form>
    </div>
  );
}

function Stat({ label, value, icon }) {
  return (
    <div className="panel p-5">
      <div className="flex items-center justify-between mb-2">
        <span className="text-2xl">{icon}</span>
        <span className="font-mono text-2xl font-bold text-brass-400">{value}</span>
      </div>
      <p className="text-xs text-white/50">{label}</p>

function Analytics() {
  const { data } = useStore();
  const analytics = data.analytics || { whatsappClicks:0, callClicks:0, events:[] };

  const topModels = useMemo(() => {
    const counts = {};
    (analytics.events||[]).forEach(e => { if (e.model) counts[e.model] = (counts[e.model]||0)+1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  }, [analytics.events]);

  const topIssues = useMemo(() => {
    const counts = {};
    (analytics.events||[]).forEach(e => { if (e.issue) counts[e.issue] = (counts[e.issue]||0)+1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  }, [analytics.events]);

  return (
    <div>
      <h1 className="font-display font-bold text-xl mb-1">نظرة عامة</h1>
      <p className="text-white/40 text-sm mb-6">إحصائيات التفاعل مع الموقع</p>
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-8">
        <Stat label="نقرات واتساب" value={analytics.whatsappClicks||0} icon="💬" />
        <Stat label="نقرات الاتصال" value={analytics.callClicks||0} icon="📞" />
        <Stat label="إجمالي الطلبات" value={(analytics.events||[]).length} icon="📈" />
      </div>
      <div className="grid sm:grid-cols-2 gap-4">
        <div className="panel p-5">
          <h2 className="label-eyebrow mb-3">الموديلات الأكثر طلباً</h2>
          {topModels.length===0 && <p className="text-white/40 text-sm">لا توجد بيانات بعد.</p>}
          <ul className="space-y-2">
            {topModels.map(([name,count]) => (
              <li key={name} className="flex items-center justify-between text-sm">
                <span className="text-white/80">{name}</span><span className="font-mono text-brass-400">{count}</span>
              </li>
            ))}
          </ul>
        </div>
        <div className="panel p-5">
          <h2 className="label-eyebrow mb-3">الأعطال الأكثر شيوعاً</h2>
          {topIssues.length===0 && <p className="text-white/40 text-sm">لا توجد بيانات بعد.</p>}
          <ul className="space-y-2">
            {topIssues.map(([name,count]) => (
              <li key={name} className="flex items-center justify-between text-sm">
                <span className="text-white/80">{name}</span><span className="font-mono text-brass-400">{count}</span>
              </li>
            ))}
          </ul>
        </div>
      </div>
    </div>
  );
}

// ===================== ADMIN: BRANDS MANAGER =====================
function BrandsManager() {
  const { data, addBrand, updateBrand, deleteBrand, addModel, deleteModel } = useStore();
  const [newBrandName, setNewBrandName] = useState("");
  const [newModelName, setNewModelName] = useState({});
  const [expanded, setExpanded] = useState(null);

  const handleAddBrand = (e) => { e.preventDefault(); if (!newBrandName.trim()) return; addBrand({name:newBrandName.trim()}); setNewBrandName(""); };
  const handleAddModel = (brandId) => {
    const name = (newModelName[brandId]||"").trim();
    if (!name) return;
    addModel(brandId, name);
    setNewModelName(p => ({...p, [brandId]:""}));
  };

  return (
    <div>
      <h1 className="font-display font-bold text-xl mb-1">الماركات والموديلات</h1>
      <p className="text-white/40 text-sm mb-6">أضف الماركات وفعّل/عطّل كل منها، وأضف الموديلات تحت كل ماركة.</p>
      <form onSubmit={handleAddBrand} className="flex gap-2 mb-6">
        <input value={newBrandName} onChange={(e)=>setNewBrandName(e.target.value)} placeholder="اسم الماركة الجديدة (مثال: Huawei)" className="input-field max-w-xs" />
        <button type="submit" className="btn-primary px-5 py-2.5 text-sm">+ إضافة ماركة</button>
      </form>
      <div className="space-y-3">
        {data.brands.map((brand) => (
          <div key={brand.id} className="panel p-4">
            <div className="flex items-center justify-between gap-3">
              <button onClick={() => setExpanded(expanded===brand.id ? null : brand.id)} className="flex items-center gap-2 flex-1 text-right">
                <span className="text-xl">{brand.logo}</span><span className="font-semibold">{brand.name}</span>
                <span className="text-xs text-white/40">({brand.models.length} موديل)</span>
              </button>
              <label className="flex items-center gap-1.5 text-xs text-white/50 cursor-pointer">
                <input type="checkbox" checked={brand.active} onChange={(e)=>updateBrand(brand.id,{active:e.target.checked})} className="accent-brass-500" /> مفعّل
              </label>
              <button onClick={() => { if (confirm(`حذف ${brand.name}؟`)) deleteBrand(brand.id); }} className="text-red-400/70 hover:text-red-400 text-xs">حذف</button>
            </div>
            {expanded===brand.id && (
              <div className="mt-4 pt-4 border-t border-ink-700">
                <div className="flex flex-wrap gap-2 mb-3">
                  {brand.models.map((m) => (
                    <span key={m.id} className="bg-ink-900 border border-ink-600 rounded-full px-3 py-1 text-xs flex items-center gap-2">
                      {m.name}
                      <button onClick={() => deleteModel(brand.id, m.id)} className="text-red-400/70 hover:text-red-400">×</button>
                    </span>
                  ))}
                  {brand.models.length===0 && <span className="text-white/30 text-xs">لا توجد موديلات بعد</span>}
                </div>
                <div className="flex gap-2">
                  <input value={newModelName[brand.id]||""} onChange={(e)=>setNewModelName(p=>({...p,[brand.id]:e.target.value}))}
                    placeholder="اسم الموديل الجديد" className="input-field max-w-xs text-xs"
                    onKeyDown={(e)=> e.key==="Enter" && handleAddModel(brand.id)} />
                  <button onClick={() => handleAddModel(brand.id)} className="btn-ghost px-4 py-2 text-xs">+ إضافة موديل</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ===================== ADMIN: NEWS TICKER MANAGER =====================
function NewsTickerManager() {
  const { data, setTicker } = useStore();
  const [items, setItems] = useState(data.newsTicker);
  const [newItem, setNewItem] = useState("");
  const save = (next) => { setItems(next); setTicker(next); };
  const handleAdd = (e) => { e.preventDefault(); if (!newItem.trim()) return; save([...items, newItem.trim()]); setNewItem(""); };
  const handleRemove = (i) => save(items.filter((_,idx)=>idx!==i));
  const handleEdit = (i, value) => { const next=[...items]; next[i]=value; setItems(next); };

  return (
    <div>
      <h1 className="font-display font-bold text-xl mb-1">الشريط الإخباري</h1>
      <p className="text-white/40 text-sm mb-6">عروض، خصومات، أو تنبيهات تظهر في شريط متحرك أعلى الموقع.</p>
      <form onSubmit={handleAdd} className="flex gap-2 mb-6">
        <input value={newItem} onChange={(e)=>setNewItem(e.target.value)} placeholder="رسالة جديدة، مثال: خصم 10% هذا الأسبوع" className="input-field" />
        <button type="submit" className="btn-primary px-5 py-2.5 text-sm whitespace-nowrap">+ إضافة</button>
      </form>
      <div className="space-y-2">
        {items.map((item, i) => (
          <div key={i} className="panel p-3 flex items-center gap-2">
            <input value={item} onChange={(e)=>handleEdit(i,e.target.value)} onBlur={()=>save(items)} className="input-field flex-1" />
            <button onClick={() => handleRemove(i)} className="text-red-400/70 hover:text-red-400 text-xs px-2">حذف</button>
          </div>
        ))}
        {items.length===0 && <p className="text-white/40 text-sm">لا توجد رسائل بعد.</p>}
      </div>
    </div>
  );
}

  return (
    <div>

        استخدم المتغيرات <code className="text-brass-400">{"{brand}"}</code> <code className="text-brass-400">{"{model}"}</code> <code className="text-brass-400">{"{issue}"}</code> داخل النص.
      </p>
      <div className="panel p-5 max-w-xl">
        <label className="label-eyebrow block mb-2">نص الرسالة</label>

}

// ===================== ADMIN: SETTINGS =====================
function SettingsPage() {
  const { data, updateSettings, resetToDefaults } = useStore();
  const [form, setForm] = useState(data.settings);
  const [saved, setSaved] = useState(false);
  const handleChange = (key, value) => setForm(f => ({...f, [key]:value}));
  const handleSave = () => { updateSettings(form); setSaved(true); setTimeout(()=>setSaved(false),1500); };
  const handleReset = () => {
    if (confirm("سيتم إرجاع كل البيانات (الماركات، الخدمات، الإعدادات) للوضع الافتراضي. متابعة؟")) {
      resetToDefaults(); setForm(data.settings);
    }
  };

  return (
    <div>
      <h1 className="font-display font-bold text-xl mb-1">الإعدادات العامة</h1>
      <p className="text-white/40 text-sm mb-6">بيانات التواصل واسم الموقع.</p>
      <div className="panel p-5 max-w-md space-y-4">
        <div><label className="label-eyebrow block mb-2">اسم الموقع</label>
          <input value={form.siteName} onChange={(e)=>handleChange("siteName",e.target.value)} className="input-field" /></div>
        <div><label className="label-eyebrow block mb-2">رقم الهاتف</label>
          <input value={form.phoneNumber} onChange={(e)=>handleChange("phoneNumber",e.target.value)} className="input-field" placeholder="01060050431" /></div>
        <div><label className="label-eyebrow block mb-2">رقم واتساب (بصيغة دولية بدون +)</label>
          <input value={form.whatsappNumber} onChange={(e)=>handleChange("whatsappNumber",e.target.value)} className="input-field" placeholder="201060050431" /></div>
        <button onClick={handleSave} className="btn-primary px-5 py-2.5 text-sm">{saved ? "تم الحفظ ✓" : "حفظ التغييرات"}</button>
      </div>
      <div className="panel p-5 max-w-md mt-6 border-red-500/20">
        <h2 className="text-sm font-semibold text-red-400 mb-2">منطقة خطرة</h2>
        <p className="text-xs text-white/40 mb-3">إرجاع كل البيانات (الماركات، الموديلات، الخدمات، الإحصائيات) إلى القيم الافتراضية. هذا الإجراء لا يمكن التراجع عنه.</p>
        <button onClick={handleReset} className="text-xs border border-red-500/40 text-red-400 rounded-lg px-4 py-2 hover:bg-red-500/10">إعادة ضبط المصنع</button>
      </div>
    </div>
  );
}

// ===================== APP =====================
function App() {
  return (
    <StoreProvider>
      <HashRouter>
        <Routes>
          <Route path="/" element={<Home />} />

        </Routes>
      </HashRouter>
    </StoreProvider>
  );
}
